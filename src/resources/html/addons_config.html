<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ArchivCZSK addons settings</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        /* Core Layout: Prevent the body from scrolling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden; /* Critical: Body stays static */
            background: #f4f7f6;
        }

        /* Sidebar: Fixed width, independent scroll */
        #sidebar {
            width: 280px;
            background: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #1a252f;
        }

        #side-panel-toggle {
            padding: 20px;
            background: #1a252f;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            margin: 0;
            text-align: left;
            flex: 0 0 auto;
        }

        /* The Scrollable Tab Container */
        #tabs-list {
            flex: 1;
            overflow-y: auto; /* Separate scrollbar for tabs */
            scrollbar-width: thin;
            scrollbar-color: #34495e #2c3e50;
        }

        /* Scrollbar styling for Chrome/Safari/Edge */
        #tabs-list::-webkit-scrollbar { width: 6px; }
        #tabs-list::-webkit-scrollbar-track { background: #2c3e50; }
        #tabs-list::-webkit-scrollbar-thumb { background: #34495e; border-radius: 10px; }

        /* Tab Styles: Applied via class so they persist regardless of count */
        .tab-link {
            padding: 15px 20px;
            cursor: pointer;
            border-bottom: 1px solid #34495e;
            transition: all 0.2s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tab-link:hover { background: #34495e; padding-left: 25px; }
        .tab-link.active {
            background: #3498db;
            font-weight: bold;
            border-left: 5px solid #fff;
        }

        /* Content Area: Independent scroll */
        #content-area {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .setting-card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 800px;
            margin: 0 auto;
        }

        .setting-item {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        .setting-input { padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        #save-btn {
            background: #27ae60; color: white; border: none;
            padding: 12px 40px; border-radius: 4px; cursor: pointer;
            font-weight: bold; display: block; margin-top: 30px;
        }
        .hidden { display: none; }
        .settings-section-title { margin-top: 25px; color: #2c3e50; }

        /* Side panel and controls */
        #side-panel { position: fixed; left: 0; top: 50px; width: 280px; background: #34495e; box-shadow: 2px 0 10px rgba(0,0,0,0.2); z-index: 1000; padding: 20px 0; }
        #side-panel-close { position: absolute; top: 10px; right: 10px; background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; padding: 0; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; }
        #side-panel a { display: block; padding: 12px 20px; color: white; text-decoration: none; border-bottom: 1px solid #2c3e50; transition: 0.2s; }
        #side-panel a:hover { background: rgba(255,255,255,0.02); }
        #side-panel.hidden { display: none; }

        /* Panel actions */
        .panel-actions { padding: 20px; border-bottom: 1px solid #34495e; display: flex; flex-direction: column; gap: 10px; }
        .panel-actions .action-btn { padding: 10px 15px; border-radius: 4px; font-size: 0.9rem; cursor: pointer; border: none; color: white; }
        .panel-actions .export-btn { background: #27ae60; }
        .panel-actions .import-btn { background: #2980b9; }
        #import-file { display: none; }

        /* Empty state */
        #empty-state { text-align: center; color: #7f8c8d; margin-top: 100px; }

        /* Mobile: move tabs to top and make content fill remaining space */
        @media (max-width: 800px) {
            /* Stack the layout vertically so top bar (tabs) sits above content */
            body { flex-direction: column; height: 94vh; }

            /* Sidebar becomes a top strip containing the toggle and tabs */
            #sidebar {
                width: 100%;
                display: flex;
                flex-direction: column;
                height: auto;
                border-right: none;
            }

            /* Side panel should overlay when opened on mobile */
            #side-panel {
                position: absolute;
                left: 0;
                top: 48px;
                width: 100%;
                z-index: 1001;
                box-shadow: 0 6px 18px rgba(0,0,0,0.25);
            }

            /* Tabs become a horizontal, scrollable bar at the top */
            #tabs-list {
                display: flex;
                flex-direction: row;
                gap: 8px;
                overflow-x: auto;
                white-space: nowrap;
                padding: 8px 6px;
                background: #2c3e50;
                position: sticky;
                top: 0;
                z-index: 900;
                -webkit-overflow-scrolling: touch;
            }

            #tabs-list .tab-link {
                display: inline-flex;
                align-items: center;
                padding: 8px 12px;
                border-bottom: none;
                border-right: 1px solid rgba(255,255,255,0.06);
                color: white;
                background: transparent;
                min-width: 80px;
                flex: 1 0 auto; /* grow if needed */
                justify-content: center;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            #tabs-list .tab-link:hover { padding-left: 12px; background: rgba(255,255,255,0.03); }
            #tabs-list .tab-link.active { background: #3498db; border-left: none; border-right: 1px solid rgba(0,0,0,0.08); }

            /* Content area should take remaining height and be independently scrollable */
            #content-area {
                order: 2;
                flex: 1 1 auto;
                min-height: 0; /* allow flex child to shrink and enable scrolling */
                height: auto;
                overflow-y: auto;
                padding: 12px;
            }

            /* Make sure the main card scales nicely on small screens */
            .setting-card { margin: 12px; padding: 18px; box-shadow: none; }
        }
    </style>
</head>
<body>
    <nav id="sidebar">
        <button id="side-panel-toggle">☰ Addons</button>
        <div id="side-panel" class="hidden">
            <button id="side-panel-close">✕</button>
            <a href="/addons">Addons</a>
            <a href="/log">Log</a>
            <div class="panel-actions">
                <button id="export-btn" class="action-btn export-btn">↓ Export Settings</button>
                <button id="import-btn" class="action-btn import-btn">↑ Import Settings</button>
                <input type="file" id="import-file" accept=".json">
            </div>

        </div>

        <script>
        $('#side-panel-toggle').on('click', function() {
            $('#side-panel').toggleClass('hidden');
        });
        $('#side-panel-close').on('click', function() {
            $('#side-panel').addClass('hidden');
        });
        </script>
        <div id="tabs-list">
            </div>
    </nav>

    <main id="content-area">
        <div id="settings-pane" class="setting-card hidden">
            <h2 id="current-tab-title">Settings</h2>
            <div id="settings-form"></div>
            <button id="save-btn">Save Changes</button>
        </div>
        <div id="empty-state">
            <h2>Select an addon to begin</h2>
        </div>
    </main>

    <script>
        $(document).ready(function() {
            let hasUnsavedChanges = false;
			let addon_id = null;

            // 1. Fetch Addons
            $.getJSON('/addons/list', function(tabs) {
                const list = $('#tabs-list');
                list.empty();
                tabs.forEach(tab => {
                    // Using classes ensures CSS applies to all, even those off-screen
                    list.append(`<div class="tab-link" data-id="${tab.id}">${tab.name}</div>`);
                });
            });

            // 2. Tab Navigation
            $(document).on('click', '.tab-link', function() {
                if (hasUnsavedChanges && !confirm("Unsaved changes will be lost. Continue?")) return;

                const id = $(this).data('id');
                const name = $(this).text();

                $('.tab-link').removeClass('active');
                $(this).addClass('active');

                loadTabSettings(id, name);
            });

            function loadTabSettings(id, name) {
                $('#empty-state').addClass('hidden');
                $('#settings-pane').removeClass('hidden');
                $('#current-tab-title').text(name);
                $('#settings-form').html('<p>Fetching configuration...</p>');
				addon_id = null;

                $.getJSON(`/addons/config/${id}`, function(data) {
                    $('#settings-form').empty();
                    hasUnsavedChanges = false;

                    data.forEach(cat => {
                        $('#settings-form').append(`<h3 class="settings-section-title">${cat.label}</h3>`);
                        cat.subentries.forEach(item => {
                            const input = createInput(item);
                            const row = $(`<div class="setting-item"><label>${item.label}</label>${input}</div>`);
                            row.find('.setting-input').data('original', item.value);
                            $('#settings-form').append(row);
                        });
                    });
					addon_id = id;
                });
            }

            function createInput(item) {
                const attrs = `class="setting-input" name="${item.id}"`;
                switch(item.type) {
                    case 'bool':
                        return `<input type="checkbox" ${attrs} ${item.value ? 'checked' : ''}>`;

                    case 'choice':
                        let opts = item.choices.map(c => `<option value="${c[0]}" ${c[0]==item.value?'selected':''}>${c[1]}</option>`).join('');
                        return `<select ${attrs}>${opts}</select>`;

                    case 'number':
						return `<input type="number" ${attrs} value="${item.value}">`;

                    case 'password':
						return `<input type="password" ${attrs} value="${item.value}">`;

                    default:
						return `<input type="text" ${attrs} value="${item.value}">`;
                }
            }

            // Dirty Check Logic
            $(document).on('input change', '.setting-input', () => { hasUnsavedChanges = true; });

            // 3. Save Changes
            $('#save-btn').on('click', function() {
                const changes = [];
                $('.setting-input').each(function() {
                    const $el = $(this);
                    const val = $el.is(':checkbox') ? $el.is(':checked') : $el.val();
                    if (String(val) !== String($el.data('original'))) {
                        changes.push({ name: $el.attr('name'), value: val });
                    }
                });

                if (!changes.length) return alert("Nothing changed.");

                $.ajax({
                    url: `/addons/config/${addon_id}`,
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify(changes),
                    success: function() {
                        alert('Saved successfully!');
                        hasUnsavedChanges = false;
                        // Update the 'original' reference
                        $('.setting-input').each(function() {
                            const v = $(this).is(':checkbox') ? $(this).is(':checked') : $(this).val();
                            $(this).data('original', v);
                        });
                    }
                });
            });

            $('#export-btn').on('click', function() {

            $.ajax({
                    url: '/addons/config_export',
                    method: 'GET',
                    success: function(data) {
                        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                        const url = URL.createObjectURL(blob);
                        const a = $('<a>').attr('href', url).attr('download', 'settings.json');
                        a[0].click();
                        URL.revokeObjectURL(url);
                    }
                });
            });

            $('#import-btn').on('click', function() {
                $('#import-file').click();
            });

            $('#import-file').on('change', function() {
                const file = this.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(e) {
                    const data = JSON.parse(e.target.result);
                    $.ajax({
                        url: '/addons/config_import',
                        method: 'POST',
                        contentType: 'application/json',
                        data: JSON.stringify(data),
                        success: function() {
                            alert('Settings imported successfully!');
                            location.reload();
                        }
                    });
                };
                reader.readAsText(file);
            });
        });
    </script>
</body>
</html>
